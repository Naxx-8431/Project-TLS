<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Background Remover</title>
    <style>
        .bg-remover-hero {
            background: linear-gradient(160deg, var(--md-sys-color-primary-container) 0%, var(--md-sys-color-surface) 100%);
            background-size: cover;
            background-position: center;
            height: 80vh;
            text-align: center;
            position: relative;
            isolation: isolate;
            overflow: visible;
            border-radius: var(--md-sys-shape-corner-extra-large);
        }

        .bg-remover-hero::before {
            content: "";
            position: absolute;
            inset: -18px;
            border-radius: 36px;
            background:
                radial-gradient(60% 60% at 15% 20%, rgba(103, 80, 164, 0.25), transparent 70%),
                radial-gradient(65% 65% at 85% 80%, rgba(125, 82, 96, 0.2), transparent 72%);
            filter: blur(16px);
            opacity: 0.9;
            z-index: -1;
        }

        .bg-remover-hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .bg-remover-hero p {
            font-size: 1.125rem;
            max-width: 500px;
            margin: 0 auto;
        }

        .upload-box {
            height: 80vh;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light navigation fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Project TLS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="bg-remove.html">Remove Background</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pdf-convert.html">Convert to PDF</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pt-5 mt-4">
        <div class="row g-4">
            <div class="col-12 col-md-6 d-flex flex-column justify-content-center align-items-center bg-remover-hero">
                <h1 class="fw-bold">Remove Image Background Instantly</h1>

                <p class="mt-3">
                    Upload your image and get a clean, transparent background in seconds.
                    No design skills needed — fast, automatic, and free to use.
                </p>

            </div>
            <div class="col-12 col-md-6">

                <form id="uploadForm" action="/php/upload-handler.php" method="POST" enctype="multipart/form-data"
                    class="w-100">
                    <input type="hidden" name="type" value="bg_remove">
                    <div
                        class="upload-box text-center p-5 align-items-center d-flex flex-column justify-content-center">
                        <i class="bi bi-cloud-upload upload-icon"></i>
                        <p class="mt-3">Drag & Drop your image here</p>
                        <p class="text-muted small">or click to browse</p>
                        <input type="file" name="image" id="imageInput" accept="image/*" hidden>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.js"></script>
    <script>
        const uploadBox = document.querySelector('.upload-box');
        const fileInput = document.getElementById('imageInput');
        const uploadForm = document.getElementById('uploadForm');

        uploadBox.addEventListener('click', () => fileInput.click());

        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('drag-over');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('drag-over');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('drag-over');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileUpload();
            }
        });

        fileInput.addEventListener('change', handleFileUpload);

        function handleFileUpload() {
            if (fileInput.files.length === 0) return;

            const file = fileInput.files[0];
            const icon = uploadBox.querySelector('.upload-icon');
            const text = uploadBox.querySelector('p:not(.text-muted)');
            const subtext = uploadBox.querySelector('.text-muted');

            icon.className = 'bi bi-hourglass-split upload-icon';
            icon.style.animation = 'spin 1s linear infinite';
            text.textContent = 'Processing...';
            subtext.textContent = 'Please wait';

            const formData = new FormData();
            formData.append('type', 'bg_remove');
            formData.append('image', file);

            fetch('/php/upload-handler.php', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    icon.className = 'bi bi-check-circle upload-icon';
                    icon.style.animation = 'none';

                    if (data.success) {
                        text.textContent = 'Background Removed!';
                        subtext.innerHTML = `<a href="${data.download_url}" class="md3-filled-button" download>Download Image</a>`;
                    } else {
                        text.textContent = 'Processing Failed';
                        subtext.textContent = data.error || 'An error occurred';
                        icon.className = 'bi bi-exclamation-circle upload-icon';
                    }
                })
                .catch(error => {
                    text.textContent = 'Error';
                    subtext.textContent = 'Network error occurred';
                    icon.className = 'bi bi-exclamation-circle upload-icon';
                    icon.style.animation = 'none';
                });
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
            .drag-over {
                border-color: var(--md-sys-color-primary) !important;
                background: var(--md-sys-color-primary-container) !important;
            }
        `;
        document.head.appendChild(style);
    </script>

</body>

</html>
